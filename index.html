<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTX CLAN | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: white; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(to right, #a855f7, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="selection:bg-purple-500">

    <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0c]/80 backdrop-blur-md border-b border-white/5 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-400">HTX</h1>
            <div class="flex space-x-8 text-[10px] font-bold tracking-[0.2em] uppercase text-gray-400">
                <a href="#" class="hover:text-white transition">Home</a>
                <a href="#roster" class="hover:text-white transition">Roster</a>
                <a href="YOUR_DISCORD_LINK_HERE" class="bg-purple-600 text-white px-5 py-2 rounded-full hover:bg-purple-700 transition shadow-lg shadow-purple-600/20">Join Discord</a>
            </div>
        </div>
    </nav>

    <section class="relative pt-48 pb-32 px-6 text-center max-w-5xl mx-auto">
        <h2 class="text-6xl md:text-9xl font-black uppercase mb-6 leading-none tracking-tighter text-white">
            We Are <br><span class="hero-gradient">HTX Esports</span>
        </h2>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto font-light mb-12 leading-relaxed">
            Dominating the competitive scene in <span class="text-white font-medium">Fortnite</span>, <span class="text-white font-medium">Valorant</span>, and <span class="text-white font-medium">Roblox</span>. 
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="#roster" class="bg-white text-black font-black px-10 py-4 rounded-xl hover:bg-gray-200 transition uppercase text-[11px] tracking-widest text-center">The Roster</a>
            <a href="YOUR_DISCORD_LINK_HERE" class="glass px-10 py-4 rounded-xl hover:bg-white/10 transition uppercase text-[11px] tracking-widest font-bold text-center">Apply Now</a>
        </div>
    </section>

    <section id="roster" class="max-w-7xl mx-auto px-6 py-20">
        <h3 class="text-4xl font-black uppercase mb-12 tracking-tighter italic">The Elite Roster</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                <p class="text-[10px] font-bold uppercase text-purple-400 mb-1">Owner / Leader</p>
                <h4 class="text-xl font-black italic uppercase">Augustine</h4>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-cyan-500">
                <p class="text-[10px] font-bold uppercase text-cyan-400 mb-1">Management</p>
                <h4 class="text-xl font-black italic uppercase">RealWhiteYT</h4>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-gray-500">
                <p class="text-[10px] font-bold uppercase text-gray-400 mb-1">Elite Member</p>
                <h4 class="text-xl font-black italic uppercase italic">Member Name</h4>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-gray-500 text-gray-600">
                <p class="text-[10px] font-bold uppercase mb-1">Recruiting</p>
                <h4 class="text-xl font-black italic uppercase">You?</h4>
            </div>
        </div>
    </section>

    <footer class="p-12 border-t border-white/5 text-center text-gray-600 text-[10px] tracking-[0.4em] uppercase">
        &copy; 2026 HTX CLAN • All Rights Reserved
    </footer>

</body>
</html>
